# Servidor
server.port=8084
spring.application.name=member-service


# Conexion a la BD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/boxcontroll_members_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate y JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Variables para JWT
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWJveGNvbnRyb2xsLWVycC1zYWFzLW11bHRpLXRlbmFudC0yMDI2}
