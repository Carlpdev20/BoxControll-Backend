version: '0.0.1'

services:
  auth-service:
    build: .
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/boxcontroll_auth_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWJveGNvbnRyb2xsLWVycC1zYWFzLW11bHRpLXRlbmFudC0yMDI2
    depends_on:
      - db

  db:
    image: postgres:13-alpine
    environment:
      POSTGRES_DB: boxcontroll_auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"